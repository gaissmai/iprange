version: '2'
run:
  timeout: 5m
linters:
  enable:
    - decorder
    - errorlint
    - gocyclo
    - govet
    - gosec
    - gosmopolitan
    - intrange
    - misspell
    - predeclared
    - reassign
    - staticcheck
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - copyloopvar
    - tparallel
    - nolintlint
    - modernize
    - gocritic
  exclusions:
    generated: lax
    rules:
      - linters:
          - gochecknoglobals
          - gosec
          - gocyclo
        path: _test\.go

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
